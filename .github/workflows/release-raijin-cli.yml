name: Release Raijin CLI

on:
  workflow_dispatch:
  push:
    tags:
      - "raijin-cli-v*"

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Windows build: produces raijin-cli-windows-x64.zip + raijin-setup.exe and
  # smoke-tests both in place (extract zip, run; silent install via setup.exe,
  # run installed copy, uninstall).
  # ---------------------------------------------------------------------------
  build-windows-cli:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: host/Raijin.Cli/go.mod

      - name: Setup MSYS2 toolchain
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-verilator

      - name: Build simulator DLL
        shell: msys2 {0}
        run: |
          cmake -S sim -B build/sim -G Ninja -DVERILATOR_ROOT=/ucrt64/share/verilator -DVERILATOR_BIN=/ucrt64/bin/verilator_bin.exe
          cmake --build build/sim --config Release

      - name: Package CLI bundle
        shell: bash
        working-directory: host/Raijin.Cli
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "host/Raijin.Cli/bin/raijin-cli-windows-x64.zip" "dist/raijin-cli-windows-x64.zip" -Force
          Copy-Item "host/Raijin.Cli/bin/raijin-setup.exe"           "dist/raijin-setup.exe"           -Force
          Get-ChildItem dist | Format-Table Name, Length

      - name: Smoke test portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $smokeDir = "dist/smoke-zip"
          Remove-Item $smokeDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $smokeDir | Out-Null
          Expand-Archive -Path "dist/raijin-cli-windows-x64.zip" -DestinationPath $smokeDir -Force

          $exe = Join-Path $smokeDir "raijin.exe"
          $dll = Join-Path $smokeDir "raijin.dll"
          if (-not (Test-Path $exe)) { throw "smoke: raijin.exe missing from zip" }
          if (-not (Test-Path $dll)) { throw "smoke: raijin.dll missing from zip" }

          & $exe --version
          if ($LASTEXITCODE -ne 0) { throw "smoke: --version exit $LASTEXITCODE" }

          # Exit codes (runner.go): 0 = halted+tohost=1, 1 = STOPPED via cycle
          # cap (matrix is an infinite animation, never halts), 2 = setup error
          # (DLL load fail, hex load fail). Accept 0 or 1; treat >=2 as failure.
          $matrixOut = $null | & $exe run matrix --max-cycles 10000 --quiet --no-status-bar 2>&1
          $matrixExit = $LASTEXITCODE
          Write-Host $matrixOut
          $matrixJoined = ($matrixOut | Out-String)
          if ($matrixExit -ge 2) { throw "smoke: run matrix exit $matrixExit  DLL likely failed to load" }
          if ($matrixJoined -notmatch "Summary") { throw "smoke: run matrix produced no Summary  sim did not run" }

          $msys2Root = "${{ steps.msys2.outputs.msys2-location }}"
          $objdump = Join-Path $msys2Root "ucrt64/bin/objdump.exe"
          if (Test-Path $objdump) {
              $deps = & $objdump -p $dll | Select-String "DLL Name:"
              Write-Host "raijin.dll dependencies:"
              $deps | ForEach-Object { Write-Host "  $_" }
              $bad = $deps | Where-Object { $_ -match "libstdc\+\+|libgcc_s|libwinpthread" }
              if ($bad) { throw "smoke: raijin.dll still depends on MinGW runtime DLLs: $bad" }
          }

      - name: Smoke test single-file installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $setup = "dist/raijin-setup.exe"
          if (-not (Test-Path $setup)) { throw "smoke: raijin-setup.exe missing" }

          & $setup --version
          if ($LASTEXITCODE -ne 0) { throw "smoke: setup --version exit $LASTEXITCODE" }

          # --silent --no-path performs the real install (extract the embedded
          # zip into %USERPROFILE%\.raijin) without touching the runner's user
          # PATH (which would persist across jobs).
          & $setup --silent --no-path
          if ($LASTEXITCODE -ne 0) { throw "smoke: setup --silent exit $LASTEXITCODE" }

          $installedExe = Join-Path $env:USERPROFILE ".raijin/bin/raijin.exe"
          $installedDll = Join-Path $env:USERPROFILE ".raijin/bin/raijin.dll"
          if (-not (Test-Path $installedExe)) { throw "smoke: installed raijin.exe missing at $installedExe" }
          if (-not (Test-Path $installedDll)) { throw "smoke: installed raijin.dll missing at $installedDll" }

          & $installedExe --version
          if ($LASTEXITCODE -ne 0) { throw "smoke: installed --version exit $LASTEXITCODE" }

          $matrixOut = $null | & $installedExe run matrix --max-cycles 10000 --quiet --no-status-bar 2>&1
          $matrixExit = $LASTEXITCODE
          Write-Host $matrixOut
          $matrixJoined = ($matrixOut | Out-String)
          if ($matrixExit -ge 2) { throw "smoke: installed run matrix exit $matrixExit" }
          if ($matrixJoined -notmatch "Summary") { throw "smoke: installed run matrix produced no Summary" }

          & $installedExe uninstall --keep-path --purge-programs
          if ($LASTEXITCODE -ne 0) { Write-Host "smoke: uninstall exit $LASTEXITCODE (continuing; runner is ephemeral anyway)" }

      - name: Upload windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raijin-cli-windows-x64
          path: |
            dist/raijin-cli-windows-x64.zip
            dist/raijin-setup.exe

  # ---------------------------------------------------------------------------
  # Linux build: produces raijin-cli-linux-x64.tar.gz and smoke-tests it
  # (extract, run, install via the built-in `raijin install` command, run
  # installed copy, uninstall). No installer .exe on Linux  the tarball is
  # the standard distribution shape.
  #
  # ubuntu-latest is currently 24.04 (Noble), which ships Verilator 5.x with
  # the --no-timing flag the project's CMakeLists relies on.
  # ---------------------------------------------------------------------------
  build-linux-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: host/Raijin.Cli/go.mod

      - name: Install Verilator + build toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              verilator cmake ninja-build gcc g++ git ca-certificates
          verilator --version
          cmake --version | head -1

      - name: Build simulator shared library
        run: |
          cmake -S sim -B build/sim -G Ninja
          cmake --build build/sim --config Release
          ldd build/sim/bin/libraijin.so

      - name: Package CLI bundle
        working-directory: host/Raijin.Cli
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          cp host/Raijin.Cli/bin/raijin-cli-linux-x64.tar.gz dist/
          ls -la dist/

      - name: Smoke test portable tarball
        run: |
          set -euo pipefail
          smokeDir="dist/smoke-tar"
          rm -rf "$smokeDir"
          mkdir -p "$smokeDir"
          tar -xzf dist/raijin-cli-linux-x64.tar.gz -C "$smokeDir"

          exe="$smokeDir/raijin"
          lib="$smokeDir/libraijin.so"
          [[ -x "$exe" ]] || { echo "smoke: raijin missing or not executable"; exit 1; }
          [[ -f "$lib" ]] || { echo "smoke: libraijin.so missing"; exit 1; }

          "$exe" --version

          # Exit codes (runner.go): 0 = halted+tohost=1, 1 = STOPPED via cycle
          # cap (matrix is an infinite animation, never halts), 2 = setup error
          # (lib load fail, hex load fail). Accept 0 or 1; treat >=2 as failure.
          set +e
          out=$("$exe" run matrix --max-cycles 10000 --quiet --no-status-bar </dev/null 2>&1)
          code=$?
          set -e
          echo "$out"
          if [[ $code -ge 2 ]]; then
              echo "smoke: run matrix exit $code  lib likely failed to load"
              exit 1
          fi
          echo "$out" | grep -q "Summary" || { echo "smoke: no Summary in output"; exit 1; }

          # Confirm libraijin.so doesn't accidentally depend on something
          # exotic. The standard glibc + libstdc++ + libgcc_s + libpthread
          # set is fine; anything outside of that on a fresh runner is a
          # red flag worth blocking the release for.
          ldd "$lib" | sort

      - name: Smoke test built-in install
        run: |
          set -euo pipefail
          smokeDir="dist/smoke-tar"
          # The `raijin install` command copies the binary + lib into
          # ~/.raijin/bin and prints the shell rc one-liner. We deliberately
          # don't run --add-to-path here because the runner is ephemeral
          # anyway and we don't want to depend on shell rc semantics for
          # the smoke check.
          "$smokeDir/raijin" install

          installedExe="$HOME/.raijin/bin/raijin"
          installedLib="$HOME/.raijin/bin/libraijin.so"
          [[ -x "$installedExe" ]] || { echo "smoke: installed raijin missing"; exit 1; }
          [[ -f "$installedLib" ]] || { echo "smoke: installed libraijin.so missing"; exit 1; }

          "$installedExe" --version
          set +e
          out=$("$installedExe" run snake --max-cycles 10000 --quiet --no-status-bar </dev/null 2>&1)
          code=$?
          set -e
          echo "$out"
          if [[ $code -ge 2 ]]; then
              echo "smoke: installed run snake exit $code"
              exit 1
          fi
          echo "$out" | grep -q "Summary" || { echo "smoke: installed no Summary"; exit 1; }

          "$installedExe" uninstall --keep-path --purge-programs

      - name: Upload linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raijin-cli-linux-x64
          path: dist/raijin-cli-linux-x64.tar.gz

  # ---------------------------------------------------------------------------
  # macOS build: Apple Silicon only. GitHub deprecated the macos-13 Intel
  # runner for free-tier repos in early 2026, and Apple Silicon is the
  # dominant architecture on current Macs. Intel Mac users can still build
  # from source (documented in host/Raijin.Cli/README.md).
  #
  # Builds libraijin.dylib natively on macos-14, packages a tarball via
  # build.sh, and smoke-tests the extract → run flow. Unsigned for now
  # (no Apple Developer Program membership), so the README walks users
  # through the one-off xattr step to clear Gatekeeper quarantine.
  # ---------------------------------------------------------------------------
  build-macos-cli:
    runs-on: macos-14
    env:
      ARCH_TAG: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: host/Raijin.Cli/go.mod

      - name: Install Verilator + build toolchain
        run: |
          brew update
          brew install verilator cmake ninja
          verilator --version
          cmake --version | head -1

      - name: Build simulator shared library
        run: |
          cmake -S sim -B build/sim -G Ninja
          cmake --build build/sim --config Release
          otool -L build/sim/bin/libraijin.dylib

      - name: Package CLI bundle
        working-directory: host/Raijin.Cli
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Stage release artifacts
        run: |
          mkdir -p dist
          cp "host/Raijin.Cli/bin/raijin-cli-macos-${ARCH_TAG}.tar.gz" dist/
          ls -la dist/

      - name: Smoke test portable tarball
        run: |
          set -euo pipefail
          smokeDir="dist/smoke-tar"
          rm -rf "$smokeDir"
          mkdir -p "$smokeDir"
          tar -xzf "dist/raijin-cli-macos-${ARCH_TAG}.tar.gz" -C "$smokeDir"

          exe="$smokeDir/raijin"
          lib="$smokeDir/libraijin.dylib"
          [[ -x "$exe" ]] || { echo "smoke: raijin missing or not executable"; exit 1; }
          [[ -f "$lib" ]] || { echo "smoke: libraijin.dylib missing"; exit 1; }

          "$exe" --version

          # Same exit-code contract as linux smoke: 0 halted, 1 cycle-cap,
          # ≥2 = setup failure. Accept 0 or 1 only.
          set +e
          out=$("$exe" run matrix --max-cycles 10000 --quiet --no-status-bar </dev/null 2>&1)
          code=$?
          set -e
          echo "$out"
          if [[ $code -ge 2 ]]; then
              echo "smoke: run matrix exit $code → lib likely failed to load"
              exit 1
          fi
          echo "$out" | grep -q "Summary" || { echo "smoke: no Summary in output"; exit 1; }

          otool -L "$lib"

      - name: Smoke test built-in install
        run: |
          set -euo pipefail
          smokeDir="dist/smoke-tar"
          "$smokeDir/raijin" install

          installedExe="$HOME/.raijin/bin/raijin"
          installedLib="$HOME/.raijin/bin/libraijin.dylib"
          [[ -x "$installedExe" ]] || { echo "smoke: installed raijin missing"; exit 1; }
          [[ -f "$installedLib" ]] || { echo "smoke: installed libraijin.dylib missing"; exit 1; }

          "$installedExe" --version
          set +e
          out=$("$installedExe" run snake --max-cycles 10000 --quiet --no-status-bar </dev/null 2>&1)
          code=$?
          set -e
          echo "$out"
          if [[ $code -ge 2 ]]; then
              echo "smoke: installed run snake exit $code"
              exit 1
          fi
          echo "$out" | grep -q "Summary" || { echo "smoke: installed no Summary"; exit 1; }

          "$installedExe" uninstall --keep-path --purge-programs

      - name: Upload macos artifacts
        uses: actions/upload-artifact@v4
        with:
          name: raijin-cli-macos-${{ env.ARCH_TAG }}
          path: dist/raijin-cli-macos-${{ env.ARCH_TAG }}.tar.gz

  # ---------------------------------------------------------------------------
  # Publish: gathers all platform artifacts and publishes them as a single
  # GitHub release. Only runs on tag pushes.
  # ---------------------------------------------------------------------------
  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-windows-cli, build-linux-cli, build-macos-cli]
    runs-on: ubuntu-latest

    steps:
      - name: Download windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: raijin-cli-windows-x64
          path: dist

      - name: Download linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: raijin-cli-linux-x64
          path: dist

      - name: Download macos arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: raijin-cli-macos-arm64
          path: dist

      - name: Inspect staged artifacts
        run: ls -la dist/

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/raijin-cli-windows-x64.zip
            dist/raijin-setup.exe
            dist/raijin-cli-linux-x64.tar.gz
            dist/raijin-cli-macos-arm64.tar.gz
          body: |
            ## Raijin CLI

            Pick the file that matches your OS:

            ### Windows x64

            **Easy: single-file installer.** Download `raijin-setup.exe`,
            double-click it, walk through the install flow. Files land in
            `%USERPROFILE%\.raijin\` and the installer offers to add the bin
            directory to your user PATH so `raijin` works from any terminal.
            You can delete `raijin-setup.exe` afterwards.

            **Portable: zip bundle.** Download `raijin-cli-windows-x64.zip`,
            extract anywhere, run `.\raijin.exe` in place. No PATH changes,
            no install.

            ```
            raijin.exe --help
            raijin.exe run matrix
            raijin.exe run doom
            ```

            ### Linux x64

            Download `raijin-cli-linux-x64.tar.gz`, extract, run `./raijin`
            in place or use the built-in install command:

            ```
            tar -xzf raijin-cli-linux-x64.tar.gz
            ./raijin --help
            ./raijin run matrix
            ./raijin install        # drops into ~/.raijin/bin and prints
                                    # the one-liner you can paste into your
                                    # shell rc to put it on PATH
            ```

            Built and tested on Ubuntu 24.04 (glibc 2.39, libstdc++ 13).
            Should work on any reasonably recent distribution.

            ### macOS (Apple Silicon)

            Download `raijin-cli-macos-arm64.tar.gz` for M1/M2/M3/M4 Macs.
            Intel Mac users can build from source (see the CLI README for
            the `./build.sh` steps) — GitHub Actions' Intel macOS runner
            was deprecated in early 2026, so we no longer ship an Intel
            tarball directly.

            The release is **not code-signed** (no Apple Developer Program
            membership). Gatekeeper will block the first run with "raijin
            cannot be opened because the developer cannot be verified".
            Clear the quarantine attribute once after extraction:

            ```
            tar -xzf raijin-cli-macos-arm64.tar.gz
            xattr -d com.apple.quarantine ./raijin ./libraijin.dylib
            ./raijin --help
            ./raijin run matrix
            ./raijin install
            ```

            After the xattr step the binary runs normally and is never
            prompted again. Built on the macos-14 Apple Silicon runner.

            ### What's in the bundle
            - `raijin` / `raijin.exe`     Go CLI host
            - `libraijin.so` / `raijin.dll` / `libraijin.dylib`  Verilated RV32IM core
            - `programs/`                 built-in demos: matrix, snake, donut, doom
            - `sdk/`                      C runtime + elf2hex.py to compile your own programs

            ### Troubleshooting
            If the CLI reports it can't load the simulator library, make sure
            the binary and the library file (`raijin.dll` / `libraijin.so` /
            `libraijin.dylib`) end up in the same directory after extraction.
