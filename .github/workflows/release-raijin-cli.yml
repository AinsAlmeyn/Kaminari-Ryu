name: Release Raijin CLI

on:
	workflow_dispatch:
	push:
		tags:
			- "raijin-cli-v*"

permissions:
	contents: write

jobs:
	build-windows-cli:
		runs-on: windows-latest

		steps:
			- name: Checkout
				uses: actions/checkout@v4

			- name: Setup Go
				uses: actions/setup-go@v5
				with:
					go-version-file: host/Raijin.Cli/go.mod

			- name: Setup MSYS2 toolchain
				uses: msys2/setup-msys2@v2
				with:
					msystem: UCRT64
					update: true
					install: >-
						git
						mingw-w64-ucrt-x86_64-gcc
						mingw-w64-ucrt-x86_64-cmake
						mingw-w64-ucrt-x86_64-ninja
						mingw-w64-ucrt-x86_64-verilator

			- name: Build simulator DLL
				shell: msys2 {0}
				run: |
					cmake -S sim -B build/sim -G Ninja
					cmake --build build/sim --config Release

			- name: Package CLI bundle
				shell: bash
				working-directory: host/Raijin.Cli
				run: |
					chmod +x ./build.sh
					./build.sh

			- name: Assemble release directory
				shell: pwsh
				run: |
					$bundleDir = "dist/raijin-cli-windows-x64"
					Remove-Item $bundleDir -Recurse -Force -ErrorAction SilentlyContinue
					New-Item -ItemType Directory -Path $bundleDir | Out-Null
					Copy-Item "host/Raijin.Cli/bin/*" $bundleDir -Recurse -Force
					Compress-Archive -Path "$bundleDir/*" -DestinationPath "dist/raijin-cli-windows-x64.zip" -Force

			- name: Upload artifact
				uses: actions/upload-artifact@v4
				with:
					name: raijin-cli-windows-x64
					path: dist/raijin-cli-windows-x64.zip

			- name: Publish GitHub release asset
				if: startsWith(github.ref, 'refs/tags/')
				uses: softprops/action-gh-release@v2
				with:
					files: dist/raijin-cli-windows-x64.zip
